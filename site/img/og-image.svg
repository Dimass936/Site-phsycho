<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F0E4"/>
      <stop offset="40%" stop-color="#D4E4D1"/>
      <stop offset="100%" stop-color="#B8CDB0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A7C59"/>
      <stop offset="100%" stop-color="#6B9F7A"/>
    </linearGradient>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#2C3E2D" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative elements -->
  <circle cx="1050" cy="100" r="180" fill="#4A7C59" opacity="0.06"/>
  <circle cx="150" cy="550" r="200" fill="#4A7C59" opacity="0.05"/>
  <circle cx="1100" cy="500" r="100" fill="#6B9F7A" opacity="0.05"/>
  <!-- Leaf decorations top-left -->
  <g transform="translate(80, 60)" opacity="0.1" fill="#4A7C59">
    <ellipse cx="50" cy="25" rx="45" ry="22" transform="rotate(-25, 50, 25)"/>
    <ellipse cx="75" cy="55" rx="38" ry="18" transform="rotate(10, 75, 55)"/>
    <ellipse cx="30" cy="65" rx="32" ry="15" transform="rotate(-15, 30, 65)"/>
    <ellipse cx="90" cy="80" rx="28" ry="14" transform="rotate(5, 90, 80)"/>
  </g>
  <!-- Leaf decorations bottom-right -->
  <g transform="translate(950, 420) scale(-1, -1)" opacity="0.08" fill="#4A7C59">
    <ellipse cx="50" cy="25" rx="45" ry="22" transform="rotate(-25, 50, 25)"/>
    <ellipse cx="75" cy="55" rx="38" ry="18" transform="rotate(10, 75, 55)"/>
    <ellipse cx="30" cy="65" rx="32" ry="15" transform="rotate(-15, 30, 65)"/>
  </g>
  <!-- Main content card -->
  <rect x="200" y="155" width="800" height="320" rx="24" fill="white" opacity="0.75" filter="url(#soft-shadow)"/>
  <!-- Title -->
  <text x="600" y="260" font-family="'Playfair Display', Georgia, serif" font-size="52" font-weight="700" fill="#2C3E2D" text-anchor="middle">Психолог онлайн</text>
  <!-- Subtitle -->
  <text x="600" y="310" font-family="'Inter', Arial, sans-serif" font-size="24" fill="#5A6B5C" text-anchor="middle">Профессиональная психологическая помощь</text>
  <!-- Accent line -->
  <rect x="500" y="340" width="200" height="4" rx="2" fill="url(#accent)"/>
  <!-- Tagline -->
  <text x="600" y="390" font-family="'Inter', Arial, sans-serif" font-size="16" fill="#7A8B7C" text-anchor="middle">Безопасное пространство для ваших чувств</text>
  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#4A7C59" opacity="0.15"/>
  <text x="600" y="612" font-family="'Inter', Arial, sans-serif" font-size="14" fill="#4A7C59" text-anchor="middle" letter-spacing="2">КПТ • EFT • ГУМАНИСТИЧЕСКИЙ ПОДХОД</text>
</svg>
