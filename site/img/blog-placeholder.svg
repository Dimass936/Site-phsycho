<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F0E4"/>
      <stop offset="50%" stop-color="#D4E4D1"/>
      <stop offset="100%" stop-color="#C1D5BE"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A7C59"/>
      <stop offset="100%" stop-color="#6B9F7A"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="80" r="120" fill="#4A7C59" opacity="0.08"/>
  <circle cx="100" cy="320" r="160" fill="#4A7C59" opacity="0.06"/>
  <circle cx="700" cy="350" r="80" fill="#6B9F7A" opacity="0.07"/>
  <!-- Leaf decoration -->
  <g transform="translate(50, 50)" opacity="0.12" fill="#4A7C59">
    <ellipse cx="40" cy="20" rx="35" ry="18" transform="rotate(-20, 40, 20)"/>
    <ellipse cx="60" cy="45" rx="30" ry="15" transform="rotate(15, 60, 45)"/>
    <ellipse cx="25" cy="55" rx="25" ry="12" transform="rotate(-10, 25, 55)"/>
  </g>
  <!-- Text area -->
  <rect x="100" y="120" width="600" height="160" rx="16" fill="white" opacity="0.7"/>
  <text x="400" y="175" font-family="'Playfair Display', Georgia, serif" font-size="36" font-weight="700" fill="#2C3E2D" text-anchor="middle">Блог психолога</text>
  <text x="400" y="215" font-family="'Inter', Arial, sans-serif" font-size="18" fill="#5A6B5C" text-anchor="middle">Полезные материалы о психологии и самопознании</text>
  <!-- Bottom accent line -->
  <rect x="300" y="240" width="200" height="4" rx="2" fill="url(#accent)"/>
</svg>
