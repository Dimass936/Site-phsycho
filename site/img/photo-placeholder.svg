<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F0E4"/>
      <stop offset="100%" stop-color="#D4E4D1"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Head silhouette -->
  <circle cx="100" cy="75" r="32" fill="#B8C5B2" opacity="0.6"/>
  <!-- Body silhouette -->
  <ellipse cx="100" cy="165" rx="50" ry="35" fill="#B8C5B2" opacity="0.6"/>
  <!-- Subtle border ring -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="#4A7C59" stroke-width="1" opacity="0.2"/>
</svg>
